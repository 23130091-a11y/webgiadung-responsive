/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'maven-publish'

    id "org.hidetake.ssh" version "2.11.2"
    id 'war'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    runtimeOnly libs.org.glassfish.web.jakarta.servlet.jsp.jstl
    testImplementation libs.org.junit.jupiter.junit.jupiter.api

}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

apply plugin: 'org.hidetake.ssh'
remotes {
    host {
        host = '127.0.0.1'
        user = sshUser
        password = sshPass
    }
}
ssh.settings {
    knownHosts = allowAnyHosts
}

task docker_app_start {
    doLast {
        println 'Đang khởi động Docker với Tomcat 11 (JDK 21)...'
        ssh.run {
            session(remotes.host) {
                execute 'docker stop mysql', ignoreError: true
                execute 'docker rm mysql', ignoreError: true
                execute 'docker run -d --name mysql -p 3306:3306 -e MYSQL_ROOT_PASSWORD=${dbPass} mysql:latest'

                execute 'docker stop tomcat9', ignoreError: true
                execute 'docker rm tomcat9', ignoreError: true
                // Sử dụng image Tomcat 11 chính thức hỗ trợ JDK 21
                execute 'docker run -d ' +
                        '--name tomcat9 ' +
                        '-v /usr/deploy:/usr/local/tomcat/webapps ' +
                        '-p 80:8080 ' +
                        'tomcat:11.0-jdk21'
                println '--- Hệ thống đã sẵn sàng! ---'
            }
        }
    }
}

task docker_upload_file_to_server {
    doLast {
        println '--- Đang upload file .war lên Docker Server ---'
        project.ssh.run {
            session(remotes.host) {
                // Xóa các file và thư mục cũ để Tomcat không bị xung đột cache
                execute 'rm -f /usr/deploy/lab.war', ignoreError: true
                execute 'rm -rf /usr/deploy/lab/', ignoreError: true

                // Lệnh put từ file build được sinh ra vào thư mục deploy
                // Lưu ý: Tên file lấy theo project.name và project.version bạn đã khai báo ở trên
                put from: "${buildDir}/libs/${project.name}-${project.version}.war",
                        into: "/usr/deploy/lab.war"

                println '--- Upload thành công! ---'
            }
        }
    }
}

task docker_deploy {
    // Chỉ định các task phụ thuộc
    dependsOn build
    dependsOn docker_upload_file_to_server
    dependsOn docker_app_start

    // Ép buộc thứ tự: Build xong -> Upload -> Start Container
    docker_upload_file_to_server.mustRunAfter build
    docker_app_start.mustRunAfter docker_upload_file_to_server
}